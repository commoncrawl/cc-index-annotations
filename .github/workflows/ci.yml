name: Makefile CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run make examples
      run: make examples
    
    - name: Test gneissweb example (host-level)
      run: |
        cd examples/gneissweb
        python annotate.py left_web_host_index.yaml join_s3_gneissweb_host.yaml action_gneissweb_medical.yaml
        cd -
    
    - name: Test combined web-graph-wikipedia example
      run: |
        cd examples/web-graph-wikipedia
        python annotate.py left_web_host_index.yaml join_web_outin.yaml join_wikipedia.yaml action_combined.yaml
        cd -
