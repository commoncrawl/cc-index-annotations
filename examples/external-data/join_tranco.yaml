# Tranco Top Sites Ranking — research-oriented domain popularity list
# https://tranco-list.eu/
# License: derived from Crux (CC BY-SA 4.0), Majestic (CC BY 3.0), Cloudflare Radar (CC BY-NC 4.0)
# Citation: Le Pochat et al. "Tranco: A Research-Oriented Top Sites Ranking Hardened Against Manipulation" NDSS 2019
# Note: URL may change — run examples/tranco-top1m/tranco-fetch.py to resolve latest
table:
  source:
    url: https://tranco-list.eu/download/L76X4/full
    format: csv
    options:
      header: false
      columns:
        rank: INTEGER
        domain: VARCHAR

prefix: tranco_
join_type: INNER
right_columns:
  - rank
join_columns:
  left: url_host_registered_domain
  right: domain
